<!-- 注意：这里的 action 使用了免费的 Formspree 服务，可以直接把询盘转发到你的 hank@alumcasting.com 邮箱 -->
<form action="https://formspree.io/f/xpqgbdly" method="POST" style="max-width: 100%; margin: 0 auto; font-family: sans-serif;">
  
  <!-- 姓名与公司 (两列布局，增加底部间距) -->
  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 24px;">
    <div>
      <label style="display: block; text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #9ca3af;">Full Name *</label>
      <input type="text" name="name" required 
             style="width: 100%; padding: 12px 16px; border: 1px solid #374151; border-radius: 6px; background-color: #111827; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box;">
    </div>
    <div>
      <label style="display: block; text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #9ca3af;">Company Name</label>
      <input type="text" name="company" 
             style="width: 100%; padding: 12px 16px; border: 1px solid #374151; border-radius: 6px; background-color: #111827; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box;">
    </div>
  </div>

  <!-- 邮箱 (全宽，增加底部间距) -->
  <div style="margin-bottom: 24px;">
    <label style="display: block; text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #9ca3af;">Business Email *</label>
    <input type="email" name="_replyto" required 
           style="width: 100%; padding: 12px 16px; border: 1px solid #374151; border-radius: 6px; background-color: #111827; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box;">
  </div>

  <!-- 材料选择与预计年产量 (两列布局，增加底部间距) -->
  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 24px;">
    <div>
      <label style="display: block; text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #9ca3af;">Material Specification</label>
      <select name="material" 
              style="width: 100%; padding: 12px 16px; border: 1px solid #374151; border-radius: 6px; background-color: #111827; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box; height: 47px; appearance: none; -webkit-appearance: none;">
        <option value="Aluminum-ADC12">Aluminum (ADC12 / A383)</option>
        <option value="Aluminum-A356">Aluminum (A356 / A360)</option>
        <option value="Magnesium-AZ91D">Magnesium (AZ91D / AM60B)</option>
        <option value="Other">Other / Not Sure Yet</option>
      </select>
    </div>
    <div>
      <label style="display: block; text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #9ca3af;">Estimated Annual Volume (EAV)</label>
      <input type="text" name="volume" placeholder="e.g., 5,000 pcs" 
             style="width: 100%; padding: 12px 16px; border: 1px solid #374151; border-radius: 6px; background-color: #111827; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box;">
    </div>
  </div>

  <!-- 项目描述 (全宽，加高输入框) -->
  <div style="margin-bottom: 32px;">
    <label style="display: block; text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #9ca3af;">Project Details & Requirements *</label>
    <textarea name="message" rows="5" required 
              placeholder="Please describe wall thickness, surface treatment (anodizing, powder coating, etc.), and tolerances if possible..." 
              style="width: 100%; padding: 12px 16px; border: 1px solid #374151; border-radius: 6px; background-color: #111827; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box; line-height: 1.6; resize: vertical;"></textarea>
  </div>

  <!-- 提交按钮 (加宽、加厚、增加高级悬停手势) -->
  <div style="text-align: left;">
    <button type="submit" 
            style="display: inline-block; padding: 14px 36px; background-color: #2563eb; color: #ffffff; font-size: 16px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; transition: background-color 0.2s ease, transform 0.1s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);"
            onmouseover="this.style.backgroundColor='#1d4ed8'" 
            onmouseout="this.style.backgroundColor='#2563eb'">
      Submit RFQ
    </button>
  </div>
</form>
