# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://blowfish.page/docs/getting-started/

theme = "blowfish"
baseURL = "https://diecasting.github.io/Kingship/"
canonifyURLs = false
relativeURLs = false

# 🎯 默认主语言设为英文
defaultContentLanguage = "en"
title = "KingShip Precision"

# 🎯 释放语言：注释掉原先的禁用列表，允许德、西、法、日、韩、意语全量编译
# disableLanguages = ["fr", "de", "it", "pt", "es", "ja", "zh-cn"]

# 🎯 保持默认：英文主站留在根目录，小语种生成在子目录下（如 /de/ /es/ 等）
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
summaryLength = 30
hasCJKLanguage = true

buildDrafts = false
buildFuture = false

enableEmoji = true
googleAnalytics = ""

# ==========================================================================
# 🌍 多语言站点内容映射配置 (Languages Configuration)
# 🎯 已全面升级新版规范：用 label 替代 languageName，完美消除本地编译警告
# ==========================================================================

# 1. 默认英文站 (English)
[languages.en]
  label = "English"
  contentDir = "content"
  weight = 1

# 2. 德语站 (German)
[languages.de]
  label = "Deutsch"
  contentDir = "content.de"   # 本地对应的德语文件夹
  weight = 2

# 3. 西班牙语站 (Spanish)
[languages.es]
  label = "Español"
  contentDir = "content.es"   # 本地对应的西语文件夹
  weight = 3

# 4. 法语站 (French)
[languages.fr]
  label = "Français"
  contentDir = "content.fr"   # 本地对应的法语文件夹
  weight = 4

# 5. 日语站 (Japanese)
[languages.ja]
  label = "日本語"
  contentDir = "content.ja"   # 本地对应的日语文件夹
  weight = 5

# 6. 韩语站 (Korean)
[languages.ko]
  label = "한국어"
  contentDir = "content.ko"   # 本地对应的韩语文件夹
  weight = 6

# 7. 意大利语站 (Italian)
[languages.it]
  label = "Italiano"
  contentDir = "content.it"   # 本地对应的意语文件夹
  weight = 7

# ==========================================================================
# 🎯 主题核心全局参数（彻底关闭分享、关联卡片和作者模块）
# ==========================================================================
[params]
  # 1. 允许加载 assets/css/custom.css，让我们的个性化调整真正生效！
  customCSS = ["css/custom.css"]
  
  # 2. 彻底打破 Blowfish 默认偏左和偏窄的限制，直接升级为大厂主流宽屏
  maxContentWidth = "max-w-screen-xl" 
  
  # 3. 确保单页面的头部 hero 区域也能跟着一起平滑加宽居中
  headerWidth = "max-w-screen-xl"

  # 4. ❌ 彻底全站隐藏底部的社交分享图标（如 LinkedIn, X, Facebook 等小图标）
  showSharing = false

  # 5. ❌ 彻底全站隐藏底部的相关文章卡片（不再显示那三个不相干的大框卡片）
  showRelated = false

  # 6. ❌ 彻底隐藏页面上下的作者头像与名称（让页面回归纯粹的 B2B 企业官网风格，而非个人博客）
  showAuthor = false
  showAuthorBottom = false

[pagination]
  pagerSize = 102

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = 'always'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  # 降维控制：将相关性阈值调高，防止意外渲染相关文章
  threshold = 100
  toLower = false

    [[related.indices]]
        name = "tags"
        weight = 100

    [[related.indices]]
        name = "categories"
        weight = 100

    [[related.indices]]
        name = "series"
        weight = 50

    [[related.indices]]
        name = "authors"
        weight = 20

    [[related.indices]]
        name = "date"
        weight = 10

    [[related.indices]]
        name = "fragmentrefs"
        type = 'fragments'
        weight = 10

# Render only specific parts of the site for faster development. 
[segments]
  [segments.core]
    [[segments.core.includes]]
      path = '{/,/docs,/docs/**,/samples,/samples/**}'
  [segments.en_only]
    [[segments.en_only.includes]]
      lang = 'en'

# --- 核心安全放行：允许在 Markdown 中渲染 HTML 询盘表单 ---
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true