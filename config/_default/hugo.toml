theme = "blowfish"
baseURL = "https://kingship.alumcasting.com/"

# 核心修正：移除 contentDir 的硬编码，改用标准 Hugo 路径模式
defaultContentLanguage = "en"
title = "KingShip Precision"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
summaryLength = 30
hasCJKLanguage = true
buildDrafts = false
buildFuture = false
enableEmoji = true

# ==========================================================================
# 🌍 修正后的多语言配置 (使用标准 Hugo 路径结构)
# ==========================================================================
[languages]
  [languages.en]
    label = "English"
    languageName = "English"
    title = "KingShip Precision"
    weight = 1
    locale = "en-us"

  [languages.de]
    label = "Deutsch"
    languageName = "Deutsch"
    title = "KingShip Präzisionsdruckguss"
    weight = 2
    locale = "de-de"

  [languages.es]
    label = "Español"
    languageName = "Español"
    title = "KingShip Fundicion a Presion"
    weight = 3
    locale = "es-es"

  [languages.fr]
    label = "Français"
    languageName = "Français"
    title = "KingShip Fonderie Sous Pression"
    weight = 4
    locale = "fr-fr"

  [languages.ja]
    label = "日本語"
    languageName = "日本語"
    title = "KingShip 精密ダイカスト"
    weight = 5
    locale = "ja-jp"

# 其他语言暂时注释，待德语稳定后再逐步添加，避免冲突
# [languages.es] ... 

# ==========================================================================
# 🎯 主题核心全局参数
# ==========================================================================
[params]
  customCSS = ["css/custom.css"]
  maxContentWidth = "max-w-screen-xl" 
  headerWidth = "max-w-screen-xl"
  
  # 全局关闭博客特有的社交/作者信息
  showSharing = false
  showRelated = false
  showAuthor = true
  showAuthorBottom = true
  sharing = false

# ==========================================================================
# 🛠️ Markup 设置 (确保 RFQ 表单 HTML 可渲染)
# ==========================================================================
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = 'always'
  filename = 'sitemap.xml'
  priority = 0.5
  