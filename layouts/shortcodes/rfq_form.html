<form action="https://formspree.io/f/xpqgbdly" method="POST" enctype="multipart/form-data" 
      style="max-width: 800px; margin: 0 auto; font-family: sans-serif; padding: 20px; border-radius: 8px; background-color: #ffffff; box-sizing: border-box; overflow: hidden;">
  
  <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px;">
    <div style="flex: 1; min-width: 250px;">
      <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151;">FULL NAME *</label>
      <input type="text" name="name" required style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box;">
    </div>
    <div style="flex: 1; min-width: 250px;">
      <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151;">COMPANY NAME</label>
      <input type="text" name="company" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box;">
    </div>
  </div>

  <div style="margin-bottom: 20px;">
    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151;">BUSINESS EMAIL *</label>
    <input type="email" name="_replyto" required style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box;">
  </div>

  <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px;">
    <div style="flex: 1; min-width: 250px;">
      <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151;">MATERIAL</label>
      <select name="material" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; background-color: #fff;">
        <option value="Aluminum-ADC12">Aluminum (ADC12 / A383)</option>
        <option value="Aluminum-A356">Aluminum (A356 / A360)</option>
        <option value="Magnesium-AZ91D">Magnesium (AZ91D / AM60B)</option>
      </select>
    </div>
    <div style="flex: 1; min-width: 250px;">
      <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151;">FILE UPLOAD *</label>
      <input type="file" name="attachment" required style="width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 13px;">
    </div>
  </div>

  <div style="margin-bottom: 24px;">
    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151;">PROJECT DETAILS *</label>
    <textarea name="message" rows="4" required style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box;"></textarea>
  </div>

  <button type="submit" style="width: 100%; padding: 16px; background-color: #2563eb; color: #ffffff; font-weight: 700; border: none; border-radius: 6px; cursor: pointer;">
    SEND TECHNICAL RFQ
  </button>
</form>
